<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta charset="UTF-8"/>

<meta
name="viewport"
content="
width=device-width,
initial-scale=1.0,
viewport-fit=cover
"
/>

<title>Mini Phone OS</title>

<!-- CSS -->

<link rel="stylesheet" href="./css/reset.css"/>

<link rel="stylesheet" href="./css/variables.css"/>

<link rel="stylesheet" href="./css/layout.css"/>

<link rel="stylesheet" href="./css/statusbar.css"/>

<link rel="stylesheet" href="./css/apps.css"/>

<link rel="stylesheet" href="./css/dock.css"/>

<link rel="stylesheet" href="./css/control-center.css"/>

<link rel="stylesheet" href="./css/app-page.css"/>

<link rel="stylesheet" href="./css/animations.css"/>

</head>

<body>

<!-- 状态栏 -->

<div class="status-bar">

    <div class="status-content">

        <div id="timeText">9:41</div>

        <div>📶 📡 🔋</div>

    </div>

</div>

<!-- 控制中心 -->

<div
class="control-center"
id="controlCenter"
>

    <div class="grabber"></div>

</div>

<!-- 页面 -->

<div class="pages-wrapper">

    <div class="pages" id="pages">

        <!-- Page 1 -->

        <div class="page">

            <div class="app">

                <div
                class="app-icon camera"
                onclick="openApp()"
                >
                    📷
                </div>

                <span>Camera</span>

            </div>

            <div class="app">
                <div class="app-icon gallery">🖼️</div>
                <span>Gallery</span>
            </div>

            <div class="app">
                <div class="app-icon music">🎵</div>
                <span>Music</span>
            </div>

            <div class="app">
                <div class="app-icon settings">⚙️</div>
                <span>Settings</span>
            </div>

        </div>

        <!-- Page 2 -->

        <div class="page">

            <div class="app">
                <div class="app-icon chat">💬</div>
                <span>Chat</span>
            </div>

            <div class="app">
                <div class="app-icon browser">🌐</div>
                <span>Browser</span>
            </div>

        </div>

    </div>

</div>

<!-- 分页 -->

<div class="page-indicator">

    <div class="dot active"></div>
    <div class="dot"></div>

</div>

<!-- Dock -->

<div class="dock">

    <div class="app-icon chat">📞</div>

    <div class="app-icon browser">✉️</div>

    <div class="app-icon music">🎧</div>

    <div class="app-icon gallery">🧸</div>

</div>

<!-- Home -->

<div class="home-indicator"></div>

<!-- App 页面 -->

<div
class="app-page"
id="appPage"
>

    <div class="app-header">

        <button
        class="back-btn"
        onclick="closeApp()"
        >
            ←
        </button>

    </div>

    <div class="app-content">

        <div class="app-title">
            Camera
        </div>

        <div class="card">

            模块化拆分成功。

        </div>

    </div>

</div>

<!-- JS -->

<script src="./js/state.js"></script>

<script src="./js/time.js"></script>

<script src="./js/swipe.js"></script>

<script src="./js/control-center.js"></script>

<script src="./js/app-system.js"></script>

<script src="./js/main.js"></script>

</body>
</html>
